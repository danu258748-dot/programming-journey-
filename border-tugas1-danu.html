<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas1</title>
  <style>
    .solid {
      border: 3px solid blue;
      padding: 10px;
      background-color: blue;
    }
    .dotted {
      border: 3px dotted red;
      padding: 10px;
      background-color: red;
    }
    .double {
      border: 5px double green;
      padding: 10px;
      background-color: green;
    }
    .dashed {
      border: 3px dashed violet;
      padding: 10px;
      background-color: violet;
    }
     .groove {
      border: 6px groove pink;
      padding: 10px;
      background-color: pink;
    }
    .ridge {
      border: 6px groove honeydew;
      padding: 10px;
      background-color: honeydew;
    }
  </style>
  
</head>
<body>
  <div class="solid">garis solid</div>
  <div class="dashed">garis dashed </div>
  <div class="dotted">garis dotted</div>
  <div class="double">garis double</div>
  <div class="groove">garis groove</div>

</body>
</html>
