<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    div.gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    div.gallery-item {
      margin: 5px;
      border: 1px solid #ccc;
      width: 180px;
    }
    div.gallery-item:hover {
      border: 1px solid #777;
    }
    div.gallery-item img {
      width: 100%;
      height: auto;
    }
     div.gallery-item div.desc {
     padding: 15px;
     text-align: center;
    }
  </style>
</head>
<body>
  <h2>Image Gallery</h2>

  <div class="gallery">

    <div class="gallery-item">
      <a target="_blank" href="cinque.jpg">
        <img src="cinque.jpg" alt="1" width="600" height="400">
      </a>
      <div class="desc">Cinque Terre</div>
    </div>

    <div class="gallery-item">
      <a target="_blank" href="forest.jpg">
        <img src="forest.jpg" alt="2" width="600" height="400">
      </a>
      <div class="desc">Green Forest</div>
    </div>

    <div class="gallery-item">
      <a target="_blank" href="nothern2.jpg">
        <img src="nothern2.jpg" alt="3" width="600" height="400">
      </a>
      <div class="desc">Nothern Lights</div>
    </div>

    <div class="gallery-item">
      <a target="_blank" href="mount.jpg">
        <img src="mount.jpg" alt="4" width="600" height="400">
      </a>
      <div class="desc">Mountains</div>
  </div>
</body>
</html>
