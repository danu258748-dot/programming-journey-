<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static</title>
   <style>
    div{
      width: 200px;
      height: 200px;
    }
    .box1{
      background-color: blue;
    }
    .box2{
      background-color: red;
      position: static;
    }
    .box3{
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  
</body>
</html>
